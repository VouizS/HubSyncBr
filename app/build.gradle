plugins {
    id 'com.android.application'
}

android {
    namespace 'br.com.hubsyncbr'
    compileSdk 35

    defaultConfig {
        applicationId 'br.com.hubsyncbr'
        minSdk 23
        targetSdk 35
        versionCode 10
        versionName '0.7.3.3-media-fields-fix'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
    }
}
